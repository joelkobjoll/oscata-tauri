services:
  oscata-vnc:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: oscata-vnc
    ports:
      - "5900:5900"
      - "6080:6080"
      - "47860:47860"
    environment:
      VNC_PASSWORD: change-me
      OSCATA_BOOTSTRAP_WEBGUI: "1"
      OSCATA_WEBGUI_HOST: 0.0.0.0
      OSCATA_WEBGUI_PORT: "47860"
      OSCATA_WEBGUI_EXPOSED_PORT: "47860"
      VNC_RESOLUTION: 1440x960
    volumes:
      - oscata-config:/config
      - oscata-downloads:/downloads
    restart: unless-stopped

volumes:
  oscata-config:
  oscata-downloads:
