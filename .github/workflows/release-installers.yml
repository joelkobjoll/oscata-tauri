name: Build release installers

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-installers:
    name: Build on ${{ matrix.platform.name }}
    runs-on: ${{ matrix.platform.runner }}
    strategy:
      fail-fast: false
      matrix:
        platform:
          - name: macOS
            runner: macos-latest
          - name: Windows
            runner: windows-latest
          - name: Linux
            runner: ubuntu-22.04

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust builds
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            src-tauri -> target

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install npm dependencies
        run: npm ci

      - name: Check bundled starter database
        shell: bash
        run: |
          if [[ -f src-tauri/resources/library.seed.db ]]; then
            echo "Bundled starter DB found:"
            ls -lh src-tauri/resources/library.seed.db
          else
            echo "::warning::src-tauri/resources/library.seed.db is missing. Installers will be built without a bundled starter database."
          fi

      - name: Build Tauri installers
        run: npm run tauri build

      - name: Create DMG fallback manually
        if: runner.os == 'macOS'
        shell: bash
        run: |
          shopt -s nullglob
          dmgs=(src-tauri/target/release/bundle/dmg/*.dmg)
          apps=("src-tauri/target/release/bundle/macos/Oscata FTP Client.app")

          if (( ${#dmgs[@]} > 0 )); then
            echo "DMG already generated by Tauri:"
            ls -lh "${dmgs[@]}"
            exit 0
          fi

          if [[ ! -d "${apps[0]}" ]]; then
            echo "Expected app bundle not found for manual DMG fallback."
            exit 1
          fi

          mkdir -p src-tauri/target/release/bundle/dmg
          tmpdir="$(mktemp -d)"
          cp -R "${apps[0]}" "$tmpdir/"
          ln -s /Applications "$tmpdir/Applications"
          hdiutil create \
            -volname "Oscata FTP Client" \
            -srcfolder "$tmpdir" \
            -ov \
            -format UDZO \
            "src-tauri/target/release/bundle/dmg/Oscata FTP Client_${{ github.ref_name }}_${{ runner.arch }}.dmg"
          rm -rf "$tmpdir"

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: installers-${{ matrix.platform.name }}
          if-no-files-found: error
          path: |
            src-tauri/target/release/bundle/**/*.dmg
            src-tauri/target/release/bundle/**/*.msi
            src-tauri/target/release/bundle/**/*.exe
            src-tauri/target/release/bundle/**/*.AppImage
            src-tauri/target/release/bundle/**/*.deb
            src-tauri/target/release/bundle/**/*.rpm
            src-tauri/target/release/bundle/**/*.app.tar.gz

      - name: Attach installers to GitHub release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          fail_on_unmatched_files: false
          files: |
            src-tauri/target/release/bundle/**/*.dmg
            src-tauri/target/release/bundle/**/*.msi
            src-tauri/target/release/bundle/**/*.exe
            src-tauri/target/release/bundle/**/*.AppImage
            src-tauri/target/release/bundle/**/*.deb
            src-tauri/target/release/bundle/**/*.rpm
            src-tauri/target/release/bundle/**/*.app.tar.gz
